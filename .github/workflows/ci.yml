name: Java CI with Maven

on:
  push:
    branches: [ "main", "develop" ] # Chạy khi push lên nhánh chính
  pull_request:
    branches: [ "main" ]           # Chạy khi tạo Pull Request

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # Bước 1: Lấy mã nguồn từ repo

    - name: Set up JDK 21
      uses: actions/setup-java@v4 # Bước 2: Cài đặt môi trường Java
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml # Bước 3: Biên dịch dự án

    - name: Run Unit Tests
      run: mvn test # Bước 4: Chạy các bài Test (JUnit)