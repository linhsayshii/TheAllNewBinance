name: Java CI with Maven

on:
  push:
    branches: [ "main", "develop", "feature/ui-base-structure" ] 
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml -DskipTests

    - name: Install libgtk (Nếu cần)
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-0 xvfb

    - name: Run Unit Tests
      run: xvfb-run mvn test