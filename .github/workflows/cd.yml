name: Production CD Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with v, e.g. v1.0, v2.1.3
  workflow_dispatch: # Enable manual trigger from GitHub UI

permissions:
  contents: write # Needed to publish releases and upload assets

jobs:
  build:
    name: Build JARs for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [windows-x64, macos-x64, macos-arm64, linux-x64]
        include:
          - platform: windows-x64
            javafx_platform: win
          - platform: macos-x64
            javafx_platform: mac
          - platform: macos-arm64
            javafx_platform: mac-aarch64
          - platform: linux-x64
            javafx_platform: linux

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: "Build Fat JARs with Maven (Target: ${{ matrix.javafx_platform }})"
        run: mvn -B clean package -Djavafx.platform=${{ matrix.javafx_platform }} -DskipTests

      - name: Prepare Client Artifact
        shell: bash
        run: |
          mkdir build-outputs
          TAG_NAME="${{ github.ref_name || 'manual' }}"
          find client/target/ -maxdepth 1 -name "client-*.jar" ! -name "original-*.jar" -exec cp {} build-outputs/client-${TAG_NAME}-${{ matrix.platform }}.jar \;
          echo "Client artifact prepared:"
          ls -la build-outputs/

      - name: Prepare Server Artifact (Linux job only)
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name || 'manual' }}"
          find server/target/ -maxdepth 1 -name "server-*.jar" ! -name "original-*.jar" -exec cp {} build-outputs/server-${TAG_NAME}.jar \;
          echo "Server artifact prepared:"
          ls -la build-outputs/

      - name: Upload Client Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-jar-${{ matrix.platform }}
          path: build-outputs/client-*.jar
          if-no-files-found: error

      - name: Upload Server Artifact (Linux job only)
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: build-outputs/server-*.jar
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download Client Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: client-jar-*
          path: release-artifacts
          merge-multiple: true

      - name: Download Server Artifact
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: release-artifacts

      - name: List Release Artifacts
        run: |
          echo "Listing all compiled files for release:"
          ls -la release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          name: Release ${{ github.ref_name }}
          body: |
            ## TheAllNewBinance `${{ github.ref_name }}`
            
            This release contains production-ready executable JARs.
            
            ### 🖥️ Client App (Cross-platform executables)
            - **Windows x64**: `client-${{ github.ref_name }}-windows-x64.jar`
            - **macOS Apple Silicon**: `client-${{ github.ref_name }}-macos-arm64.jar`
            - **macOS Intel**: `client-${{ github.ref_name }}-macos-x64.jar`
            - **Linux x64**: `client-${{ github.ref_name }}-linux-x64.jar`
            
            *Run command:* `java -jar client-${{ github.ref_name }}-<platform>.jar`
            
            ### ⚙️ Server App (Platform independent)
            - **Server JAR**: `server-${{ github.ref_name }}.jar`
              *Run command:* `java -jar server-${{ github.ref_name }}.jar`
            
            ---
            *Built automatically using GitHub Actions.*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
